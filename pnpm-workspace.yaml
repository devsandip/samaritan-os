# Dependencies allowed to run install scripts. pnpm blocks them by default and
# leaves an unresolved entry blocked, so a placeholder here fails `pnpm install`
# with ERR_PNPM_IGNORED_BUILDS and, more confusingly, leaves vitest reporting
# "No test files found" because esbuild's binary was never linked.
allowBuilds:
  # vitest's transform layer. Its install script links a prebuilt platform
  # binary; there is no build from source.
  esbuild: true

  # The local embedder's ONNX runtime (§7). Its install script links a prebuilt
  # native binary; blocked, `@huggingface/transformers` silently falls back to
  # WASM, which is several times slower for the same result. Allowed, because a
  # slow path nobody can see is worse than a build script.
  onnxruntime-node: true

  # Pulled in by the transformers stack. protobufjs's script only generates CLI
  # helper bundles and sharp's fetches an image-processing binary we never call:
  # Recall indexes text, never images. Neither is needed, so neither runs.
  protobufjs: false
  sharp: false
