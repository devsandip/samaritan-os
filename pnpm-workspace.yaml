# Dependencies allowed to run install scripts. pnpm blocks them by default and
# leaves an unresolved entry blocked, so a placeholder here fails `pnpm install`
# with ERR_PNPM_IGNORED_BUILDS and, more confusingly, leaves vitest reporting
# "No test files found" because esbuild's binary was never linked.
allowBuilds:
  # vitest's transform layer. Its install script links a prebuilt platform
  # binary; there is no build from source.
  esbuild: true
  onnxruntime-node: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
